<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Интерактивная карта природных источников воды Казахстана</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://api-maps.yandex.ru/2.1/?lang=ru_RU" type="text/javascript"></script>
    <style>
        #map { height: 480px; width: 100%; border-radius: 0.75rem; }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 font-sans min-h-screen flex flex-col">

    <header class="bg-gradient-to-r from-blue-700 to-cyan-600 text-white shadow-lg p-4">
        <div class="container mx-auto flex flex-col md:flex-row justify-between items-center gap-4">
            <div>
                <h1 class="text-2xl font-bold tracking-wide">💧 ГИДРО-КАРТА КАЗАХСТАНА</h1>
                <p class="text-xs text-blue-100 mt-1">Интерактивный анализ природных источников для электролиза Юткина</p>
            </div>
            <div class="flex items-center gap-3" id="globalMenuZone">
                <button id="adminPanelBtn" class="bg-blue-800 text-gray-400 px-3 py-1.5 text-xs font-semibold rounded-md transition opacity-40 cursor-not-allowed">
                    ⚙️ Кабинет модератора
                </button>
                <div id="authSection">
                    <button onclick="openAuthModal()" class="bg-white text-blue-700 px-4 py-1.5 rounded-full font-medium hover:bg-blue-50 text-sm shadow-sm transition">
                        Войти / Регистрация
                    </button>
                </div>
            </div>
        </div>
    </header>

    <div id="profileDashboard" class="container mx-auto mt-4 px-4 hidden">
        <div class="bg-gradient-to-r from-blue-50 to-indigo-50 border border-blue-200 rounded-xl p-4 shadow-xs">
            <h3 class="text-xs font-bold uppercase tracking-wider text-blue-600">Электронный паспорт исследователя (Данные с бэкенда):</h3>
            <div id="profileDetailsGrid" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-3 mt-2 text-xs text-gray-700">
                </div>
        </div>
    </div>

    <main class="container mx-auto p-4 flex-grow grid grid-cols-1 lg:grid-cols-3 gap-6">
        <div class="lg:col-span-1 flex flex-col gap-4 bg-white p-4 rounded-xl shadow-sm border border-gray-100 h-[620px]">
            <h2 class="text-lg font-bold text-gray-700 border-b pb-2">🔍 Поиск и фильтрация</h2>
            <input type="text" id="searchQuery" placeholder="Поиск по названию, району..." class="w-full p-2.5 border rounded-lg text-sm bg-gray-50 outline-none focus:border-blue-500 transition" />
            
            <div class="grid grid-cols-2 gap-2 text-xs">
                <div>
                    <label class="block text-gray-500 mb-1">Статус воды</label>
                    <select id="filterStatus" class="w-full p-2 border rounded-md bg-gray-50 outline-none">
                        <option value="all">Все статусы</option>
                        <option value="suitable">💚 Подходит</option>
                        <option value="checking">💛 Проверяется</option>
                        <option value="unsuitable">❌ Не подходит</option>
                    </select>
                </div>
                <div>
                    <label class="block text-gray-500 mb-1">Тип источника</label>
                    <select id="filterType" class="w-full p-2 border rounded-md bg-gray-50 outline-none">
                        <option value="all">Все типы</option>
                        <option value="Родник">Родники</option>
                        <option value="Колонка">Колонки</option>
                        <option value="Скважина">Скважины</option>
                        <option value="Минеральный">Минеральные</option>
                        <option value="Артезианский">Артезианские</option>
                    </select>
                </div>
            </div>
            <div class="mt-2 border-t pt-2 flex-grow overflow-y-auto space-y-2 pr-1" id="sourcesList"></div>
        </div>

        <div class="lg:col-span-2 flex flex-col gap-4">
            <div class="bg-white p-2 rounded-xl shadow-sm border border-gray-100">
                <div id="map"></div>
            </div>
            <div id="detailsCard" class="bg-white p-5 rounded-xl shadow-sm border border-gray-100 hidden"></div>
            <div id="noSelectPlaceholder" class="bg-gray-100 border border-dashed border-gray-300 rounded-xl p-8 text-center text-gray-500 text-sm flex-grow flex items-center justify-center">
                👈 Выберите маркер капли на Яндекс Карте или элемент в списке слева для просмотра физико-химических показателей.
            </div>
        </div>
    </main>

    <div id="authModal" class="fixed inset-0 bg-black/60 flex items-center justify-center p-4 z-[99999] hidden">
        <div class="bg-white p-6 rounded-xl max-w-md w-full shadow-2xl transition-all">
            
            <div class="flex border-b mb-4 text-sm font-semibold">
                <button onclick="switchAuthTab('login')" id="tabLoginBtn" class="w-1/2 pb-2 text-blue-600 border-b-2 border-blue-600 text-center">Вход</button>
                <button onclick="switchAuthTab('register')" id="tabRegisterBtn" class="w-1/2 pb-2 text-gray-400 text-center">Регистрация студента</button>
            </div>

            <div id="authMessage" class="text-xs font-medium hidden p-2.5 rounded-md mb-3"></div>

            <form id="loginForm" onsubmit="handleBackendLogin(event)" class="space-y-3">
                <div>
                    <label class="block text-xs text-gray-500 mb-1">Имя пользователя (Логин)</label>
                    <input type="text" id="loginUsername" required placeholder="Например: student2026" class="w-full p-2.5 border rounded-lg text-sm bg-gray-50 outline-none focus:border-blue-500" />
                </div>
                <div>
                    <label class="block text-xs text-gray-500 mb-1">Пароль</label>
                    <input type="password" id="loginPassword" required placeholder="••••••••" class="w-full p-2.5 border rounded-lg text-sm bg-gray-50 outline-none focus:border-blue-500" />
                </div>
                <div class="flex justify-end gap-2 pt-2">
                    <button type="button" onclick="closeAuthModal()" class="px-4 py-2 text-xs border rounded-lg hover:bg-gray-50">Отмена</button>
                    <button type="submit" class="px-4 py-2 text-xs bg-blue-600 text-white font-bold rounded-lg hover:bg-blue-700">Войти</button>
                </div>
            </form>

            <form id="registerForm" onsubmit="handleBackendRegister(event)" class="space-y-3 hidden">
                <div class="grid grid-cols-2 gap-2">
                    <div>
                        <label class="block text-xs text-gray-500 mb-1">Желаемый логин *</label>
                        <input type="text" id="regUsername" required placeholder="User123" class="w-full p-2 border rounded-lg text-xs bg-gray-50 outline-none focus:border-blue-500" />
                    </div>
                    <div>
                        <label class="block text-xs text-gray-500 mb-1">Пароль *</label>
                        <input type="password" id="regPassword" required placeholder="••••••••" class="w-full p-2 border rounded-lg text-xs bg-gray-50 outline-none focus:border-blue-500" />
                    </div>
                </div>

                <div>
                    <label class="block text-xs text-gray-500 mb-1">ФИО Студента *</label>
                    <input type="text" id="regFio" required placeholder="Иванов Иван Иванович" class="w-full p-2 border rounded-lg text-xs bg-gray-50 outline-none focus:border-blue-500" />
                </div>

                <div class="grid grid-cols-3 gap-2">
                    <div class="col-span-1">
                        <label class="block text-xs text-gray-500 mb-1">Возраст *</label>
                        <input type="number" id="regAge" required min="16" max="100" placeholder="20" class="w-full p-2 border rounded-lg text-xs bg-gray-50 outline-none focus:border-blue-500" />
                    </div>
                    <div class="col-span-2">
                        <label class="block text-xs text-gray-500 mb-1">Университет (ВУЗ) *</label>
                        <input type="text" id="regUniversity" required placeholder="МУИТ (IITU)" class="w-full p-2 border rounded-lg text-xs bg-gray-50 outline-none focus:border-blue-500" />
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-2">
                    <div>
                        <label class="block text-xs text-gray-500 mb-1">Специальность *</label>
                        <input type="text" id="regSpecialty" required placeholder="ВТиПО / ИС" class="w-full p-2 border rounded-lg text-xs bg-gray-50 outline-none focus:border-blue-500" />
                    </div>
                    <div>
                        <label class="block text-xs text-gray-500 mb-1">Курс обучения *</label>
                        <select id="regCourse" required class="w-full p-2 border rounded-lg text-xs bg-gray-50 outline-none focus:border-blue-500">
                            <option value="1">1 курс</option>
                            <option value="2">2 курс</option>
                            <option value="3">3 курс</option>
                            <option value="4">4 курс</option>
                            <option value="Магистратура">Магистратура</option>
                            <option value="PhD Докторантура">PhD Докторантура</option>
                        </select>
                    </div>
                </div>

                <div class="flex justify-end gap-2 pt-2">
                    <button type="button" onclick="closeAuthModal()" class="px-4 py-2 text-xs border rounded-lg hover:bg-gray-50">Отмена</button>
                    <button type="submit" class="px-4 py-2 text-xs bg-emerald-600 text-white font-bold rounded-lg hover:bg-emerald-700">Зарегистрироваться</button>
                </div>
            </form>

        </div>
    </div>

    <script src="data.js"></script>
    <script src="app.js"></script>
</body>
</html>
