<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>IT-IS2506 Project</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://api-maps.yandex.ru/2.1/?lang=ru_RU" type="text/javascript"></script>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; }
        #map { position: absolute; top: 0; left: 0; height: 100%; width: 100%; z-index: 1; }
        
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 2px; }
        .dark .custom-scrollbar::-webkit-scrollbar-thumb { background: #334155; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 antialiased font-sans">

    <div id="map"></div>

    <header class="absolute top-4 left-4 right-4 md:right-auto md:w-[400px] z-10 pointer-events-none">
        <div class="bg-white/95 dark:bg-slate-950/95 backdrop-blur-md shadow-lg rounded-2xl p-3 border border-slate-200/80 dark:border-slate-800/80 pointer-events-auto flex flex-col gap-3">
            <div class="flex items-center justify-between gap-2">
                <div>
                    <h1 class="text-sm font-bold tracking-tight text-slate-900 dark:text-white uppercase font-mono">Карта исследований</h1>
                </div>
                <div id="authSection" class="flex items-center gap-2">
                    <button onclick="openAuthModal()" class="text-[11px] bg-slate-100 hover:bg-slate-200 dark:bg-slate-900 dark:hover:bg-slate-800 dark:text-slate-300 font-medium px-3 py-1.5 rounded-xl transition-all cursor-pointer border border-slate-200 dark:border-slate-800">
                        Войти
                    </button>
                </div>
            </div>

            <div class="relative">
                <input type="text" id="searchQuery" placeholder="Поиск источника или адреса..." class="w-full pl-3 pr-8 py-2 text-xs bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-xl focus:outline-none focus:border-blue-500 text-slate-900 dark:text-white" />
            </div>

            <div class="grid grid-cols-2 gap-1.5">
                <select id="filterStatus" class="p-2 text-[11px] bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-lg text-slate-700 dark:text-slate-300 focus:outline-none focus:border-blue-500">
                    <option value="all">Все статусы</option>
                    <option value="suitable">Подходит</option>
                    <option value="checking">На анализе</option>
                    <option value="unsuitable">Отклонен</option>
                </select>
                <select id="filterType" class="p-2 text-[11px] bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-lg text-slate-700 dark:text-slate-300 focus:outline-none focus:border-blue-500">
                    <option value="all">Все типы</option>
                    <option value="Родник">Родник</option>
                    <option value="Скважина">Скважина</option>
                    <option value="Минеральный">Минеральный</option>
                </select>
            </div>
        </div>
    </header>

    <section class="absolute top-44 bottom-4 left-4 w-[400px] hidden md:flex flex-col z-10 pointer-events-none">
        <div id="sourcesList" class="custom-scrollbar overflow-y-auto space-y-2 pointer-events-auto max-h-full pb-4">
            </div>
    </section>

    <div class="absolute top-4 right-4 z-10 flex flex-col md:flex-row gap-2">
        <button id="adminPanelBtn" onclick="openModeratorModal()" disabled class="text-xs opacity-0 pointer-events-none bg-white dark:bg-slate-950 px-4 py-2.5 rounded-xl font-bold border border-slate-200 dark:border-slate-800 shadow-md transition-all">
            Кабинет Модератора
        </button>
        <button onclick="openAddPointModal()" class="hidden md:block text-xs bg-blue-600 hover:bg-blue-700 text-white font-semibold px-4 py-2.5 rounded-xl transition-all shadow-lg shadow-blue-600/10 cursor-pointer">
            Заказать исследование (20 000 ₸)
        </button>
    </div>

    <div class="absolute bottom-6 right-4 z-10 md:hidden">
        <button onclick="openAddPointModal()" class="w-12 h-12 bg-blue-600 hover:bg-blue-700 text-white rounded-full flex items-center justify-center shadow-xl cursor-pointer transition-transform active:scale-95">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor" class="w-6 h-6">
                <path stroke-linecap="round" stroke-linejoin="round" d="M12 4.5v15m7.5-7.5h-15" />
            </svg>
        </button>
    </div>

    <div id="detailsWrapper" class="absolute bottom-0 left-0 right-0 md:left-auto md:right-4 md:bottom-4 z-20 max-h-[50vh] md:max-h-none md:w-[450px] p-4 md:p-0 pointer-events-none transition-transform duration-300 translate-y-full">
        <div class="bg-white/95 dark:bg-slate-950/95 backdrop-blur-md shadow-2xl rounded-2xl p-5 border border-slate-200/80 dark:border-slate-800/80 pointer-events-auto relative overflow-y-auto max-h-[45vh] md:max-h-[75vh] custom-scrollbar">
            <button onclick="closeDetailsCard()" class="absolute top-4 right-4 text-slate-400 hover:text-slate-600 dark:hover:text-slate-200 text-lg cursor-pointer">&times;</button>
            <div id="detailsCard"></div>
        </div>
    </div>

    <script src="data.js"></script>
    <script src="app.js"></script>
</body>
</html>
